context_for_scoring: |
  I'm a 20-year-old University of Michigan junior (3.89 GPA, club triathlon
  team captain) interning at Mosaic Digital in growth analytics for Summer 2026.
  My academic background is economics and cognitive science with a statistics
  minor, but my actual operating style is product/strategy thinking plus applied
  technical execution.

  My primary target is applied AI roles — specifically, using LLMs to
  streamline and automate real workflows. I arrived at this by noticing what
  I actually enjoy: across three projects (Vantage, Mathetes, Pulse), the
  through line is taking a messy real-world process and building an LLM system
  that turns it into something structured, validated, and useful. That is the
  work I want to do, and "applied AI intern" is the name for it.

  I am not a fluent from-scratch software engineer and should not be scored as
  one. I direct AI coding tools to implement systems while I make the design,
  integration, and validation decisions. For applied AI roles this is a
  qualification, not a gap — the job is using AI tools well and exercising
  judgment about where they fit, not writing systems code from scratch.

  When scoring, weight roles that:
  - Are genuinely about applying LLMs / AI to real workflows, products, or
    business processes
  - Recruit for judgment, systems thinking, and AI fluency rather than years
    of CS experience or a CS degree
  - Are genuinely entry-level or first-internship friendly, not disguised
    new-grad or senior engineering roles
  - Would teach production-grade AI deployment, evaluation discipline, or
    customer/workflow context I can't build alone
  - Sit at AI-first companies (applied/solutions/product tracks), vertical AI
    startups, AI tooling teams inside larger companies, or AI practices at
    consulting firms

  De-prioritize roles that:
  - Are core ML research or require graduate-level math/ML background
  - Require fluent from-scratch engineering, low-latency systems, or specific frameworks I haven't used
  - Are fundamentally sales or relationship-cultivation roles
  - Are pure quant trading or research
  - Slot me into a narrow function with little learning surface, or sit at
  - slow-culture large companies

hard_negatives:
# Score these LOW even when the domain (data / behavioral / AI) matches.
# The disqualifier is the requirement, not the topic.
- roles requiring fluent independent coding from scratch (SWE, ML engineer, data scientist, quant)
- roles filtering on CS/math degree or heavy DSA/algorithms screens
- back-office or pure-analyst roles with no ownership of a number or P&L
- large-org IC tracks where comp is capped salary with no equity

target_archetypes:
- AI solutions / AI forward-deployed engineering / applied roles at early-to-mid-stage startups
- growth / GTM engineering (automating revenue workflows with AI)
- performance-marketing or operator roles that own a P&L or a core metric
- operator/strategy roles at companies rich in consumer or behavioral data

positive_signals:
  - equity component or early-stage (Series Seed–B) — wealth via ownership
  - "we value builders who ship with AI over traditional engineers"
  - touches consumer/behavioral data OR internal AI-workflow automation
  - smaller team but not too small, broad scope, direct line to revenue
